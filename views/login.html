<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>ChrisBasket Admin — Connexion</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="/css/style.css"/>
<link rel="stylesheet" href="/css/admin.css"/>
</head>
<body>
<div class="login-page">
  <div class="login-card">
    <div class="login-logo">Chris<span>Basket</span></div>
    <div class="login-sub">Panneau Administrateur</div>
    <div class="error-msg" id="err" style="display:none">❌ Identifiants incorrects.</div>
    <form method="POST" action="/admin/login" style="display:flex;flex-direction:column;gap:1rem">
      <div class="form-group">
        <label>Nom d'utilisateur</label>
        <input type="text" name="username" placeholder="admin" required/>
      </div>
      <div class="form-group">
        <label>Mot de passe</label>
        <input type="password" name="password" placeholder="••••••••" required/>
      </div>
      <button type="submit" class="btn btn-orange" style="width:100%;justify-content:center;margin-top:.5rem">Se Connecter →</button>
    </form>
    <div style="text-align:center;margin-top:1.5rem">
      <a href="/" style="font-size:.8rem;color:rgba(255,255,255,0.3);text-decoration:none">← Retour à la boutique</a>
    </div>
  </div>
</div>
<script>if(new URLSearchParams(location.search).get('erreur'))document.getElementById('err').style.display='block'</script>
</body>
</html>
